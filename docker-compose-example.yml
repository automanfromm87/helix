services:
  frontend:
    image: simpleyyt/helix-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - helix-network
    environment:
      - BACKEND_URL=http://backend:8000

  backend:
    image: simpleyyt/helix-backend
    depends_on:
      - sandbox
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
    networks:
      - helix-network
    environment:
      # Anthropic API key (required unless AGENT_LLM_BASE_URL points at a
      # gateway that injects auth upstream)
      - LLM_API_KEY=
      # Optional overrides — leave empty for direct upstream access:
      #- AGENT_LLM_BASE_URL=
      #- LLM_PROXY_ADDRESS=
      # LLM model name
      - MODEL_NAME=claude-opus-4-7
      # LLM temperature parameter, controls randomness
      #- TEMPERATURE=0.7
      # Maximum tokens for LLM response
      #- MAX_TOKENS=4096
      # More configuration options: https://docs.ai-helix.com/#/configuration

  sandbox:
    image: simpleyyt/helix-sandbox
    command: /bin/sh -c "exit 0"  # prevent sandbox from starting, ensure image is pulled
    restart: "no"
    networks:
      - helix-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=helix
      - POSTGRES_PASSWORD=helix
      - POSTGRES_DB=helix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - helix-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - helix-network

volumes:
  postgres_data:
    name: helix-postgres-data

networks:
  helix-network:
    name: helix-network
    driver: bridge